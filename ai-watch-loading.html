<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI分析中 · 知道AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 50% -22%, rgba(16, 185, 129, 0.08), transparent 38%), #06090f;
      color: #e5e7eb;
    }
    .menu-item { color: #8da0bf; transition: 0.2s; }
    .menu-item:hover { color: #d3dff1; background: rgba(255,255,255,0.05); }
    .menu-item.active {
      color: #fff;
      border-color: rgba(16, 185, 129, 0.36);
      background: rgba(16, 185, 129, 0.15);
      box-shadow: 0 0 16px rgba(16, 185, 129, 0.18);
    }
    .flow-steps {
      display: grid;
      grid-template-columns: auto 1fr auto 1fr auto 1fr auto;
      align-items: center;
      gap: 10px;
      color: #6b7280;
      font-weight: 700;
      margin-bottom: 24px;
    }
    .flow-step { display: flex; align-items: center; gap: 10px; }
    .flow-no {
      width: 32px; height: 32px; border-radius: 999px; border: 1px solid #374151;
      display: inline-flex; align-items: center; justify-content: center; font-size: 16px;
      color: #d1d5db; background: #111827; flex-shrink: 0;
    }
    .flow-label { font-size: 14px; white-space: nowrap; color: #6b7280; }
    .flow-line { height: 1px; background: rgba(148, 163, 184, 0.28); min-width: 30px; }
    .flow-step.active .flow-no {
      border-color: rgba(16, 185, 129, 0.6);
      background: rgba(16, 185, 129, 0.2);
      color: #ecfeff;
    }
    .flow-step.active .flow-label { color: #e5e7eb; }
    .hero-icon {
      width: 156px; height: 156px; margin: 0 auto; position: relative; border-radius: 999px;
      border: 2px solid #10b981; display: flex; align-items: center; justify-content: center;
    }
    .hero-icon::before, .hero-icon::after {
      content: ""; position: absolute; border-radius: 999px; border: 2px solid #10b981; inset: 12px;
    }
    .hero-icon::after { inset: 24px; }
    .bars {
      width: 82px; height: 72px; display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 6px; align-items: end; z-index: 2;
    }
    .bars span { border-radius: 6px; background: linear-gradient(180deg, #a7f3d0, #10b981); }
    .bars span:nth-child(1) { height: 36px; background: linear-gradient(180deg, #e5e7eb, #9ca3af); }
    .bars span:nth-child(2) { height: 54px; }
    .bars span:nth-child(3) { height: 42px; background: linear-gradient(180deg, #e5e7eb, #9ca3af); }
    .bars span:nth-child(4) { height: 62px; }
    .center { text-align: center; padding-top: 24px; }
    .center h1 { margin: 24px 0 8px; font-size: 44px; font-weight: 800; color: #1f2937; }
    .center p { margin: 0; font-size: 22px; color: #9ca3af; font-weight: 700; }
  </style>
</head>
<body>
  <header class="h-14 border-b border-white/10 flex items-center justify-between px-4 md:px-6 sticky top-0 bg-[#070b12]/90 backdrop-blur z-40">
    <div class="flex items-center gap-3">
      <a href="index.html" class="px-3 h-8 inline-flex items-center rounded-lg border border-white/15 bg-white/5 text-xs font-semibold text-slate-300 hover:text-white">返回首页</a>
      <div class="font-bold tracking-wide text-sm">AI交易诊断</div>
      <span class="px-2 py-1 rounded-full border border-emerald-300/35 bg-emerald-500/15 text-[11px] text-emerald-200">Diagnostic</span>
    </div>
  </header>

  <div class="grid grid-cols-[70px_1fr] h-[calc(100vh-56px)]">
    <aside class="border-r border-white/10 bg-[#060b12] flex flex-col items-center py-3 gap-2">
      <div class="w-10 h-10 rounded-xl bg-white/5 border border-white/10"></div>
      <a href="index.html" class="menu-item w-12 h-12 rounded-xl border border-transparent inline-flex flex-col items-center justify-center text-[11px]">对话</a>
      <div class="menu-item active w-12 h-12 rounded-xl border inline-flex flex-col items-center justify-center text-[11px]">AI诊断</div>
      <a href="trade.html" class="menu-item w-12 h-12 rounded-xl border border-transparent inline-flex flex-col items-center justify-center text-[11px]">交易</a>
      <a href="AI深度分析金融界面 (11).html" class="menu-item w-12 h-12 rounded-xl border border-transparent inline-flex flex-col items-center justify-center text-[11px]">发现</a>
      <a href="authorize.html" class="menu-item w-12 h-12 rounded-xl border border-transparent inline-flex flex-col items-center justify-center text-[11px]">授权</a>
    </aside>

    <main class="overflow-auto">
      <div class="mx-auto max-w-[1240px] px-6 md:px-8 py-9 md:py-10">
        <div class="flow-steps" aria-label="诊断流程进度">
          <div class="flow-step"><span class="flow-no">1</span><span class="flow-label">选择数据源</span></div>
          <div class="flow-line"></div>
          <div class="flow-step active"><span class="flow-no">2</span><span class="flow-label">AI分析</span></div>
          <div class="flow-line"></div>
          <div class="flow-step"><span class="flow-no">3</span><span class="flow-label">诊断报告</span></div>
          <div class="flow-line"></div>
          <div class="flow-step"><span class="flow-no">4</span><span class="flow-label">生成专属策略</span></div>
        </div>
        <section class="center">
          <div class="hero-icon">
            <div class="bars"><span></span><span></span><span></span><span></span></div>
          </div>
          <h1>AI正在分析您的交易数据...</h1>
          <p>这可能需要几秒钟时间</p>
        </section>
      </div>
    </main>
  </div>

  <script>
    setTimeout(() => {
      const query = window.location.search || "";
      window.location.href = `ai-watch-report.html${query}`;
    }, 5000);
  </script>
</body>
</html>
